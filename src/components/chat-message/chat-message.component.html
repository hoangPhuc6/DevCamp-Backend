
<div class="w-full px-4 py-2 flex" [class.justify-end]="isUser()" [class.justify-start]="!isUser()">
  <div class="max-w-xl flex items-start gap-3">
    @if (isModel() || isTool()) {
      <div class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold text-sm">
        G
      </div>
    }

    <div 
      class="rounded-2xl px-4 py-2.5 text-slate-800"
      [class.bg-blue-500]="isUser()"
      [class.text-white]="isUser()"
      [class.rounded-br-lg]="isUser()"
      [class.bg-slate-200]="isModel() || isTool()"
      [class.rounded-bl-lg]="isModel() || isTool()"
    >
      @if (message().searchEntryPoint) {
        <div class="search-entry-point" [innerHTML]="message().searchEntryPoint"></div>
      }
      @if (isTool()) {
        <div class="flex items-center gap-1.5 mb-1">
          <div class="w-2 h-2 rounded-full bg-slate-400"></div>
          <p class="text-xs text-slate-500 font-medium">Tool Call</p>
        </div>
      }
      <p class="text-sm whitespace-pre-wrap" [innerHTML]="processedContent()"></p>
    </div>

    @if (isUser()) {
      <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-sm">
        U
      </div>
    }
  </div>
</div>
